<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecretStory | Découvre ce que le monde pense de toi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bg-gradient {
            background: radial-gradient(circle at top right, #4c1d95, #1e1b4b, #000000);
        }

        @keyframes shake {

            0%,
            100% {
                transform: translateX(0);
            }

            25% {
                transform: translateX(-5px);
            }

            75% {
                transform: translateX(5px);
            }
        }

        .shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
</head>

<body class="bg-gradient text-white min-h-screen flex flex-col items-center px-6">

    <header class="py-12 text-center">
        <h1
            class="text-4xl font-extrabold tracking-tighter bg-clip-text text-transparent bg-gradient-to-r from-purple-400 to-pink-600">
            SecretStory
        </h1>
        <p class="text-gray-400 mt-2 text-sm uppercase tracking-widest">Édition 2026</p>
    </header>

    <main class="w-full max-w-md flex-1">
        <div class="text-center mb-10">
            <h2 class="text-3xl font-bold leading-tight">
                Découvre ce que le monde <br>
                <span class="text-purple-400 font-extrabold underline decoration-pink-500">pense de toi.</span>
            </h2>
            <p class="text-gray-400 mt-4">Crée ton lien, partage-le en statut WhatsApp et reçois des messages anonymes.
            </p>
        </div>

        <div class="glass rounded-3xl p-8 shadow-2xl">
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-gray-400 mb-2 ml-1">Choisis ton pseudo</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-purple-400 font-bold">@</span>
                        <input type="text" placeholder="ton_nom"
                            class="w-full bg-black/40 border border-white/10 rounded-2xl py-4 pl-10 pr-4 focus:outline-none focus:ring-2 focus:ring-purple-600 transition-all text-white placeholder:text-gray-600">
                    </div>
                </div>

                <button onclick="createLink()"
                    class="w-full bg-gradient-to-r from-purple-600 to-pink-600 hover:from-purple-500 hover:to-pink-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    Générer mon lien 🚀
                </button>
            </div>

            <p class="text-center text-xs text-gray-400 mt-6 flex items-center justify-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-purple-400" fill="none" viewBox="0 0 24 24"
                    stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                        d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span>Garanti 100% anonyme. Aucune inscription requise.</span>
            </p>
        </div>

        <div class="mt-12 flex justify-between gap-4">
            <div class="text-center flex-1">
                <div class="flex justify-center mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z" />
                    </svg>
                </div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">1. Copie</p>
            </div>

            <div class="text-center flex-1">
                <div class="flex justify-center mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z" />
                    </svg>
                </div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">2. Statut WA</p>
            </div>

            <div class="text-center flex-1">
                <div class="flex justify-center mb-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="w-8 h-8 text-purple-400" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M7 8h10M7 12h4m1 8l-4-4H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-3l-4 4z" />
                    </svg>
                </div>
                <p class="text-[10px] text-gray-400 uppercase font-bold tracking-wider">3. Secrets</p>
            </div>
        </div>
    </main>

    <footer class="py-8">
        <a href="#" onclick="goToMessages(event)"
            class="text-sm text-gray-500 hover:text-white transition-colors underline decoration-gray-700">
            J'ai déjà un lien, voir mes messages
        </a>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // Initialisation Supabase
        const supabaseUrl = 'https://esobynkttegitxvdeuyv.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVzb2J5bmt0dGVnaXR4dmRldXl2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjczNjE2MTcsImV4cCI6MjA4MjkzNzYxN30.jrvrusfMyAiYb5yUw7eBH3vhIRpx1663CoxpczZtYoI';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        // Fonction pour rediriger vers les messages
        function goToMessages(event) {
            if (event) event.preventDefault();

            // ATTENTION : Vérifie bien l'orthographe de 'my_secret_username'
            const myUsername = localStorage.getItem('my_secret_username');

            if (myUsername && myUsername.trim() !== "") {
                // Si trouvé, on va aux messages
                window.location.href = 'messages.html';
            } else {
                // Si non trouvé, on force l'utilisateur à créer un pseudo
                const inputField = document.querySelector('input');
                inputField.focus();
                inputField.placeholder = "Aucun compte trouvé. Crée ton pseudo !";
                inputField.classList.add('shake', 'border-red-500');

                setTimeout(() => inputField.classList.remove('shake'), 300);
            }
        }

        // On garde la création de lien
        async function createLink() {
            const inputField = document.querySelector('input');
            const username = inputField.value.trim().toLowerCase();
            const btn = document.querySelector('button');

            if (!username) {
                alert("Choisis un pseudo pour continuer !");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Création en cours... ⏳";

            try {
                const { error } = await _supabase.from('profiles').insert([{ username: username }]);

                if (!error || error.code === '23505') {
                    localStorage.setItem('my_secret_username', username);
                    window.location.href = 'success.html';
                } else {
                    throw error;
                }
            } catch (err) {
                alert("Erreur. Tente un autre pseudo.");
                btn.disabled = false;
                btn.innerText = "Générer mon lien 🚀";
            }
        }
    </script>

</body>

</html>
